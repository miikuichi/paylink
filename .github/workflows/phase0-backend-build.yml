name: Phase 0 - Backend Build & Test

on:
  push:
    branches: [master, develop]
    paths:
      - backend/**
      - .github/workflows/phase0-backend-build.yml
  pull_request:
    branches: [master, develop]
    paths:
      - backend/**
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend
    
    strategy:
      matrix:
        java-version: [19]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Display Java version
        run: java -version

      - name: Build with Maven (compile only)
        run: ./mvnw clean compile

      - name: Run unit tests
        run: ./mvnw test

      - name: Build production JAR
        run: ./mvnw clean package -DskipTests -Dspring.profiles.active=production

      - name: Check JAR file
        run: |
          if [ -f target/paylink-0.0.1-SNAPSHOT.jar ]; then
            echo "✅ JAR built successfully"
            ls -lh target/paylink-0.0.1-SNAPSHOT.jar
          else
            echo "❌ JAR file not found"
            exit 1
          fi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: paylink-backend-jar
          path: backend/target/paylink-0.0.1-SNAPSHOT.jar
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 19
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 19
          cache: maven

      - name: Check code formatting
        run: ./mvnw spotless:check || true

      - name: Run checkstyle
        run: ./mvnw checkstyle:check || true

      - name: Run PMD analysis
        run: ./mvnw pmd:check || true

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: paylink-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 19
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 19
          cache: maven

      - name: Run OWASP Dependency-Check
        run: ./mvnw dependency-check:check || true

      - name: Check for security issues with Maven
        run: ./mvnw verify -DskipTests -Dmaven.test.skip=true || true

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [build-and-test]
    if: always()
    
    steps:
      - name: Build Status
        run: |
          if [ "${{ needs.build-and-test.result }}" == "success" ]; then
            echo "✅ Backend build successful"
            exit 0
          else
            echo "❌ Backend build failed"
            exit 1
          fi
