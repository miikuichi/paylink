name: Phase 1 - Web Deploy Ready

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - web/**
      - .github/workflows/phase1-web-deploy-ready.yml

jobs:
  build-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          VITE_API_BASE_URL: ${{ secrets.WEB_API_BASE_URL }}
        run: npm run build:prod

      - name: Upload web artifact (dist)
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
