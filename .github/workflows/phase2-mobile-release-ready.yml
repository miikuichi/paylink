name: Phase 2 - Mobile Release Ready

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - mobile/**
      - .github/workflows/phase2-mobile-release-ready.yml

jobs:
  build-mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug Kotlin compile gate
        run: ./gradlew :app:compileDebugKotlin

      - name: Build release APK and AAB
        env:
          PAYLINK_API_BASE_URL: ${{ secrets.MOBILE_API_BASE_URL }}
          PAYLINK_RELEASE_STORE_FILE: ${{ github.workspace }}/mobile/release-keystore.jks
          PAYLINK_RELEASE_STORE_PASSWORD: ${{ secrets.MOBILE_RELEASE_STORE_PASSWORD }}
          PAYLINK_RELEASE_KEY_ALIAS: ${{ secrets.MOBILE_RELEASE_KEY_ALIAS }}
          PAYLINK_RELEASE_KEY_PASSWORD: ${{ secrets.MOBILE_RELEASE_KEY_PASSWORD }}
        run: |
          if [ -n "${{ secrets.MOBILE_RELEASE_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.MOBILE_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > release-keystore.jks
          fi
          ./gradlew :app:assembleRelease :app:bundleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-apk
          path: mobile/app/build/outputs/apk/release/*.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-aab
          path: mobile/app/build/outputs/bundle/release/*.aab
