# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=false

# Hibernate Performance Settings
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# Fix for Supabase pooler prepared statement issue
# Disable prepared statement caching to prevent "already exists" errors
spring.jpa.properties.hibernate.jdbc.use_streams_for_binary=true
# CRITICAL: Disable Hibernate prepared statement handling for pooler
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false

