spring.application.name=paylink

# Loads application-local.properties (gitignored) for Supabase credentials + JWT secret.
# See application-local.properties.example for the required keys.
spring.profiles.active=local

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway manages the schema; Hibernate should never auto-generate DDL.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT defaults (secret/override via application-local.properties or env vars)
paylink.security.jwt.expiration-ms=86400000

