# Production Configuration for PayLink Backend
# This file is loaded when spring.profiles.active=production
# All sensitive values should be provided via environment variables
# NOTE: Do NOT set spring.profiles.active here - it must be set via environment variable or command line only

# === Server Configuration ===
server.port=${SERVER_PORT:9091}
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=always

# === Database Configuration ===
# Connection details from environment variables (required)
# CRITICAL: Disable prepared statement caching for Supabase pooler compatibility
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?preparedStatementCacheQueries=0&preparedStatementCacheSizeMB=0&loggerLevel=OFF
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=0
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=validate
# Hibernate auto-detects PostgreSQL dialect - no need to specify explicitly
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Performance tuning
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
# CRITICAL: Disable Hibernate prepared statement handling for pooler
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false

# === Flyway Migrations ===
# CRITICAL: Disable Flyway for Supabase pooler - it causes prepared statement conflicts
spring.flyway.enabled=false

# === Logging ===
logging.level.root=WARN
logging.level.edu.cit.sevilla.paylink=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_DIR:logs}/paylink.log
logging.file.max-size=10MB
logging.file.max-history=30

# === JWT Security ===
paylink.security.jwt.expiration-ms=86400000
paylink.security.jwt.secret=${JWT_SECRET}
paylink.security.jwt.issuer=PayLink
paylink.security.jwt.audience=PayLink-Users

# === CORS Configuration ===
paylink.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://paylink-web.onrender.com}
paylink.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
paylink.cors.allowed-headers=*
paylink.cors.max-age=3600
paylink.cors.allow-credentials=true

# === Application Info ===
spring.application.name=PayLink API
app.version=0.0.1
app.environment=production

# === Actuator (Health Checks) ===
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# === Jackson (JSON Serialization) ===
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC
