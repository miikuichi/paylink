spring.application.name=paylink

# Loads application-local.properties (gitignored) for credentials at runtime.
# See application-local.properties.example for the required keys.
spring.profiles.active=local

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway manages the schema; Hibernate should never auto-generate DDL.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT — expiration is safe to commit; secret is provided by application-local.properties
paylink.security.jwt.expiration-ms=86400000

# --- Supabase Postgres connection ---
# Defined in application-local.properties (gitignored). See application-local.properties.example.
spring.datasource.driver-class-name=org.postgresql.Driver