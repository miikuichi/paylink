# PayLink Application Configuration
# Environment-specific values are loaded from .env file via spring.config.import

spring.application.name=paylink
server.port=9091

# ===== Spring Profile =====
# Loaded from .env: SPRING_PROFILES_ACTIVE
# (Options: local, production, test)

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=validate
# Hibernate auto-detects PostgreSQL dialect - no need to specify explicitly
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Performance Settings (batch operations and query optimization)
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=50
# Disable prepared statement caching for Supabase pooler compatibility
spring.jpa.properties.hibernate.jdbc.use_streams_for_binary=true
# CRITICAL: Disable Hibernate prepared statement handling for pooler
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false

# ===== Flyway Database Migrations =====
# CRITICAL: Disable Flyway for Supabase pooler - it causes prepared statement conflicts
spring.flyway.enabled=false
#spring.flyway.baseline-on-migrate=true
#spring.flyway.locations=classpath:db/migration
#spring.flyway.validate-on-migrate=true

# ===== Database Connection =====
# Values from .env: DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver
# CRITICAL: Disable prepared statement caching for Supabase pooler compatibility
# These parameters prevent "bind message has N result formats" errors
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?preparedStatementCacheQueries=0&preparedStatementCacheSizeMB=0&loggerLevel=OFF
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
# Keep connections alive indefinitely (0 = disabled)
spring.datasource.hikari.idle-timeout=0
spring.datasource.hikari.max-lifetime=1800000

# ===== JWT Security =====
# Values from .env: JWT_SECRET
paylink.security.jwt.expiration-ms=86400000
paylink.security.jwt.secret=${JWT_SECRET}
paylink.security.jwt.issuer=PayLink
paylink.security.jwt.audience=PayLink-Users

# ===== CORS Configuration =====
# Values from .env: CORS_ALLOWED_ORIGINS
paylink.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
paylink.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
paylink.cors.allowed-headers=*
paylink.cors.max-age=3600
paylink.cors.allow-credentials=true

# ===== Logging =====
# Values from .env: LOG_DIR, LOG_LEVEL
logging.level.root=WARN
logging.level.edu.cit.sevilla.paylink=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=${LOG_DIR:logs}/paylink.log
logging.file.max-size=10MB
logging.file.max-history=30

# ===== Jackson (JSON) =====
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ===== Actuator (Health Checks) =====
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ===== Load Environment Variables from .env file =====
# This imports variables from .env and makes them available as ${VAR_NAME}
spring.config.import=optional:file:.env[.properties]

app.frontend-url=${FRONTEND_URL:http://localhost:5173}

app.admin.enabled=${ADMIN_ENABLED:false}
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}