spring.application.name=paylink

# Loads application-local.properties (gitignored) for credentials at runtime.
# See application-local.properties.example for the required keys.
spring.profiles.active=production

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway manages the schema; Hibernate should never auto-generate DDL.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT — expiration (ms). Secret should be provided via env var JWT_SECRET or application-local.properties.
paylink.security.jwt.expiration-ms=86400000
paylink.security.jwt.secret=${JWT_SECRET:}

# --- Datasource (use env vars in production; local overrides in application-local.properties) ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres}
